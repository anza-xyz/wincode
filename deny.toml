# Configuration for cargo-deny
# See https://embarkstudios.github.io/cargo-deny/

[advisories]
version = 2
yanked = "warn"
ignore = [
    { id = "RUSTSEC-2025-0141", reason = "used as fuzzing reference only; bincode 1.3.3 is considered complete and stable by the original team" },
]

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"

[licenses]
version = 2
confidence-threshold = 0.8
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "Unicode-3.0",
]

[sources]
unknown-registry = "warn"
unknown-git = "warn"
