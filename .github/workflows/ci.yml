name: CI

on:
  push:
    branches: [master]
  pull_request:

env:
  NIGHTLY: nightly-2025-06-23

jobs:
  nightly:
    name: rustfmt, clippy & miri (nightly)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1.17.0
        with:
          toolchain: ${{ env.NIGHTLY }}
          components: rustfmt, clippy, miri, rust-src
          rustflags: ""
      - name: rustfmt (check)
        run: cargo +${{ env.NIGHTLY }} fmt --all -- --check
      - name: clippy (deny warnings)
        run: cargo +${{ env.NIGHTLY }} clippy --all-targets --all-features -- -D warnings
      - name: clippy (empty features)
        run: cargo +${{ env.NIGHTLY }} clippy --no-default-features -- -D warnings
      - name: clippy (alloc)
        run: cargo +${{ env.NIGHTLY }} clippy --no-default-features --features alloc -- -D warnings
      - name: miri (check)
        run: cargo +${{ env.NIGHTLY }} miri test --all-features --lib --bins --no-fail-fast --workspace --exclude wincode-fuzz

  test:
    name: tests (MSRV)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1.17.0
        with:
          toolchain: 1.89.0
          rustflags: ""
      - name: tests
        run: cargo test --all-features --all-targets --no-fail-fast --workspace
      - name: test bv compatibility
        run: cargo test -p wincode --no-default-features --features bv
      - name: test bv strict
        run: cargo test -p wincode --no-default-features --features bv-strict
      - name: test alloc
        run: cargo test --no-default-features --features alloc --no-fail-fast --workspace
      - name: test doc
        run: cargo test --all-features --doc --no-fail-fast --workspace
      - name: test uuid no serde compat
        run: cargo test uuid --no-default-features --features alloc,uuid --no-fail-fast --workspace

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    env:
      RUSTUP_TOOLCHAIN: 1.89.0
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1.17.0
        with:
          toolchain: 1.89.0
          rustflags: ""
      - name: install cargo-deny
        run: cargo install cargo-deny --version 0.19.0 --locked
      - name: cargo deny
        run: cargo deny check

  fuzz:
    name: fuzz smoke check (nightly)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions-rust-lang/setup-rust-toolchain@166cdcfd11aee3cb47222f9ddb555ce30ddb9659 # v1.17.0
        with:
          toolchain: nightly
          components: rustfmt, clippy
          rustflags: ""
      - name: rustfmt (fuzz)
        run: cargo +nightly fmt --manifest-path fuzz/Cargo.toml -- --check
      - name: clippy (fuzz)
        run: cargo +nightly clippy --manifest-path fuzz/Cargo.toml --all-targets -- -D warnings
      - uses: dtolnay/install@d0dc46e85ffd2c174b5ac0489e17f95dae84fa5a # cargo-fuzz
      - run: cargo +nightly fuzz run roundtrip --no-trace-compares -- -max_len=$((5 << 20)) -max_total_time=60
